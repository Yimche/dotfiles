[mgr]
ratio = [1, 2, 3]
sort_by = "alphabetical" 
linemode = "size"
show_symlink = true
sort_dir_first = true

[opener]
edit = [
	{ run = '$EDITOR "$@"', orphan = true, block = true},
]
open = [
	{ run = '~/code_Master/scripts/launch.sh "$@"', orphan = true, block = true, desc = "Open" },
]
play = [
	{ run = 'mpv "$@"', orphan = true, desc = "play media" },
]
